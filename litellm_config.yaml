# ==========================================================================
# GLOBAL SETTINGS
# ==========================================================================
litellm_settings:
  # Budget enforcement
  max_budget: 200
  budget_duration: 30d

  # Observability
  callbacks:
    - prometheus

  # Cost tracking
  success_callback:
    - "langfuse"  # Optional — uncomment for detailed analytics

  # Retry logic
  num_retries: 3
  request_timeout: 120

  # Cache
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379

# ==========================================================================
# ROUTER SETTINGS — intelligent fallback chains
# ==========================================================================
router_settings:
  routing_strategy: "cost-based-routing"
  num_retries: 3
  retry_after: 5
  allowed_fails: 2
  cooldown_time: 60

  # Model group fallbacks:
  # If primary model in a group fails, try the next one
  model_group_alias:
    silkroute-auto:
      - silkroute-standard        # Try DeepSeek V3.2 first
      - silkroute-standard-fallback  # Then Qwen3 235B
      - silkroute-standard-tools  # Then GLM-4.7
