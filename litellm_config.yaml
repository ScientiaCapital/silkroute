# SilkRoute LiteLLM Configuration
# Chinese-model-first routing with 3-tier cost optimization
#
# Tier 1 (FREE):     Simple tasks — triage, templates, status checks
# Tier 2 (STANDARD): Code review, PR descriptions, analysis
# Tier 3 (PREMIUM):  Complex debugging, architecture, security review

model_list:
  # ========================================================================
  # TIER 1: FREE MODELS (rate-limited, zero cost)
  # ========================================================================
  - model_name: silkroute-free-coder
    litellm_params:
      model: openrouter/qwen/qwen3-coder:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1
    model_info:
      id: silkroute-free-coder
      description: "Qwen3 Coder (Free) — simple coding tasks"

  - model_name: silkroute-free-reasoning
    litellm_params:
      model: openrouter/deepseek/deepseek-r1-0528:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1
    model_info:
      id: silkroute-free-reasoning
      description: "DeepSeek R1 (Free) — simple reasoning tasks"

  - model_name: silkroute-free-general
    litellm_params:
      model: openrouter/z-ai/glm-4.5-air:free
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1
    model_info:
      id: silkroute-free-general
      description: "GLM-4.5 Air (Free) — summaries and templates"

  # ========================================================================
  # TIER 2: STANDARD MODELS (cost-effective daily drivers)
  # ========================================================================
  - model_name: silkroute-standard
    litellm_params:
      model: openrouter/deepseek/deepseek-v3.2
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1
    model_info:
      id: silkroute-standard
      description: "DeepSeek V3.2 — primary workhorse ($0.25/$0.38 per M)"

  - model_name: silkroute-standard-fallback
    litellm_params:
      model: openrouter/qwen/qwen3-235b-a22b-2507
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1
    model_info:
      id: silkroute-standard-fallback
      description: "Qwen3 235B — standard fallback ($0.07/$0.46 per M)"

  - model_name: silkroute-standard-tools
    litellm_params:
      model: openrouter/z-ai/glm-4.7
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1
    model_info:
      id: silkroute-standard-tools
      description: "GLM-4.7 — best tool calling ($0.25/$1.00 per M)"

  - model_name: silkroute-standard-light
    litellm_params:
      model: openrouter/qwen/qwen3-30b-a3b
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1
    model_info:
      id: silkroute-standard-light
      description: "Qwen3 30B — lightweight ($0.06/$0.22 per M)"

  # ========================================================================
  # TIER 3: PREMIUM MODELS (max capability)
  # ========================================================================
  - model_name: silkroute-premium
    litellm_params:
      model: openrouter/deepseek/deepseek-r1-0528
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1
    model_info:
      id: silkroute-premium
      description: "DeepSeek R1 — complex reasoning ($0.40/$1.75 per M)"

  - model_name: silkroute-premium-code
    litellm_params:
      model: openrouter/qwen/qwen3-coder
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1
    model_info:
      id: silkroute-premium-code
      description: "Qwen3 Coder 480B — heavy coding ($0.22/$0.95 per M)"

  - model_name: silkroute-premium-agent
    litellm_params:
      model: openrouter/z-ai/glm-5
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1
    model_info:
      id: silkroute-premium-agent
      description: "GLM-5 — agentic tool calling ($1.00/$3.20 per M)"

  - model_name: silkroute-premium-multiagent
    litellm_params:
      model: openrouter/moonshotai/kimi-k2
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1
    model_info:
      id: silkroute-premium-multiagent
      description: "Kimi K2 — multi-step agents ($0.39/$1.90 per M)"

