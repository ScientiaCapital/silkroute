# Local production testing — validates Dockerfile before Railway deploy
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   curl http://localhost:8787/health
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml down

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: silkroute-api
    ports:
      - "8787:8787"
    environment:
      PORT: "8787"
      SILKROUTE_DB_POSTGRES_URL: postgresql://silkroute:silkroute@postgres:5432/silkroute
      SILKROUTE_DB_REDIS_URL: redis://redis:6379/0
      # Production posture: auth REQUIRED. The API refuses to start if the key is
      # empty (SILKROUTE_ENVIRONMENT=production), and `:?` makes compose itself
      # error if SILKROUTE_API_KEY is unset — no accidental open-money-faucet.
      SILKROUTE_ENVIRONMENT: production
      SILKROUTE_API_KEY: ${SILKROUTE_API_KEY:?SILKROUTE_API_KEY is required for production}
      # Set to "true" for a public try-it deployment (disables money-spending endpoints).
      SILKROUTE_API_DEMO_MODE: ${SILKROUTE_API_DEMO_MODE:-false}
      SILKROUTE_API_HOST: "0.0.0.0"
      SILKROUTE_API_CORS_ORIGINS: '["http://localhost:3000"]'
      SILKROUTE_OPENROUTER_API_KEY: ${SILKROUTE_OPENROUTER_API_KEY:-}
      # model-finops telemetry (opt-in; inert unless ENABLED=true). base_url must
      # point at a finops instance reachable from inside the container, not the
      # host's localhost — override on the host when enabling.
      SILKROUTE_FINOPS_ENABLED: ${SILKROUTE_FINOPS_ENABLED:-false}
      SILKROUTE_FINOPS_BASE_URL: ${SILKROUTE_FINOPS_BASE_URL:-http://localhost:8000}
      SILKROUTE_FINOPS_TOKEN: ${SILKROUTE_FINOPS_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
